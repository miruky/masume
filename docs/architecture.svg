<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" role="img" aria-label="masumeのアーキテクチャ図">
  <title>masumeのアーキテクチャ: 語彙データから盤面生成、出題、採点までの流れ</title>
  <style>
    .box { fill: #fdfefe; stroke: #d3dde1; rx: 10; }
    .zone { fill: #eceff1; stroke: #dbe2e6; rx: 14; }
    .t { font-family: 'Hiragino Sans','Noto Sans JP',system-ui,sans-serif; fill: #20282b; }
    .h { font-size: 13px; font-weight: 600; }
    .s { font-size: 11px; fill: #64727a; }
    .zl { font-size: 11px; font-weight: 600; fill: #0f766e; letter-spacing: 1px; }
    .arrow { stroke: #64727a; stroke-width: 1.6; fill: none; marker-end: url(#head); }
    @media (prefers-color-scheme: dark) {
      .box { fill: #1c2224; stroke: #313c40; }
      .zone { fill: #161b1d; stroke: #252d2f; }
      .t { fill: #e5eaec; }
      .s { fill: #93a3aa; }
      .zl { fill: #4fd1c5; }
      .arrow { stroke: #93a3aa; }
    }
  </style>
  <defs>
    <marker id="head" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L7 4 L0 8 Z" fill="#64727a"/>
    </marker>
  </defs>

  <rect class="zone" x="20" y="20" width="740" height="92"/>
  <text class="t zl" x="36" y="44">データ(src/lib/data)</text>
  <rect class="box" x="36" y="56" width="708" height="44"/>
  <text class="t h" x="52" y="76">words.ts</text>
  <text class="t s" x="52" y="92">カタカナ3文字以上の語彙とカギ。カギは答えの語を含まない</text>

  <path class="arrow" d="M390 112 V140"/>

  <rect class="zone" x="20" y="144" width="740" height="128"/>
  <text class="t zl" x="36" y="168">盤面生成(generator.ts)</text>
  <rect class="box" x="36" y="180" width="344" height="76"/>
  <text class="t h" x="52" y="202">配置の探索</text>
  <text class="t s" x="52" y="219">シード付き乱数で語を引き、交差できる位置だけに</text>
  <text class="t s" x="52" y="234">貪欲に置く。前後の閉塞・平行接触はルールで禁止。</text>
  <text class="t s" x="52" y="249">語数が目標に届くまで作り直し、最良の盤面を採用</text>
  <rect class="box" x="400" y="180" width="344" height="76"/>
  <text class="t h" x="416" y="202">番号づけと採点</text>
  <text class="t s" x="416" y="219">左上から走査してカギ番号を振る(同じ開始マスの</text>
  <text class="t s" x="416" y="234">ヨコ・タテは同番号)。grade()が入力と解答を</text>
  <text class="t s" x="416" y="249">突き合わせ、誤りマスの座標を返す</text>

  <path class="arrow" d="M390 272 V300"/>

  <rect class="zone" x="20" y="304" width="740" height="76"/>
  <text class="t zl" x="36" y="328">UI(main.ts)</text>
  <rect class="box" x="36" y="338" width="226" height="34"/>
  <text class="t h" x="52" y="360">盤面とカギの連動</text>
  <rect class="box" x="278" y="338" width="226" height="34"/>
  <text class="t h" x="294" y="360">かな入力の正規化と自動移動</text>
  <rect class="box" x="520" y="338" width="224" height="34"/>
  <text class="t h" x="536" y="360">URLハッシュで問題共有</text>
</svg>
